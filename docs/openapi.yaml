openapi: 3.1.0
info:
  title: MeshSelfie API
  version: 0.1.0
  description: Photorealistic Human Mesh 생성 MVP API 명세
servers:
  - url: /api
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Supabase JWT
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
    Profile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        displayName:
          type: [string, "null"]
        role:
          type: string
          enum: [user, admin]
        meshCount:
          type: integer
        completedMeshCount:
          type: integer
        dailyQuota:
          type: integer
        remainingCredits:
          type: integer
        usedCredits:
          type: integer
    MeshStatus:
      type: string
      enum: [queued, validating, preprocessing, generating, postprocessing, thumbnailing, completed, failed, canceled, deleted]
    QualityGrade:
      type: string
      enum: [B, A, A+]
paths:
  /profile:
    get:
      summary: 내 프로필과 사용량 조회
      responses:
        "200":
          description: Profile result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Profile"
        "401":
          description: 인증 필요
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /uploads/images:
    post:
      summary: front/side/angle45 이미지 업로드
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [frontImage]
              properties:
                frontImage:
                  type: string
                  format: binary
                sideImage:
                  type: string
                  format: binary
                sideDirection:
                  type: string
                  enum: [left, right]
                angle45Image:
                  type: string
                  format: binary
                angle45Direction:
                  type: string
                  enum: [left, right]
      responses:
        "200":
          description: 업로드 성공
        "400":
          description: 검증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /generate:
    post:
      summary: Human Mesh 생성 요청
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [frontSourceImageId]
              properties:
                frontSourceImageId:
                  type: string
                  format: uuid
                sideSourceImageId:
                  type: string
                  format: uuid
                angle45SourceImageId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: 생성 job 생성
        "402":
          description: 크레딧 부족
        "409":
          description: 진행 중인 동일 조합 job 존재
  /generation-jobs/{jobId}:
    get:
      summary: 생성 job 상태 조회
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: job 상태
  /meshes:
    get:
      summary: 내 Human Mesh 목록
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/MeshStatus"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 목록 조회 성공
  /meshes/{meshId}:
    get:
      summary: Human Mesh 상세
      parameters:
        - name: meshId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 상세 조회 성공
    delete:
      summary: 내 Human Mesh soft delete
      description: 모든 모델 상태에서 삭제할 수 있다. 진행 중인 생성 작업은 취소하고 모델은 30일 후 purge 대상으로 표시한다.
      parameters:
        - name: meshId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 삭제 상태 저장 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      status:
                        type: string
                        const: deleted
                      deletedAt:
                        type: string
                        format: date-time
                      purgeAfter:
                        type: string
                        format: date-time
                      providerCancellation:
                        type: string
                        enum: [not_applicable, canceled, failed]
        "404":
          description: 모델 없음 또는 이미 삭제됨
  /meshes/{meshId}/download:
    get:
      summary: GLB 다운로드 signed URL 발급
      parameters:
        - name: meshId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 다운로드 URL 발급
        "409":
          description: 아직 완료되지 않음
  /gallery:
    get:
      summary: Featured Mesh Gallery
      security: []
      responses:
        "200":
          description: Featured 목록
  /admin/models:
    get:
      summary: 관리자 모델 검색
      responses:
        "200":
          description: 검색 성공
  /admin/models/upload:
    post:
      summary: 관리자 모델 업로드
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [modelFile, purpose]
              properties:
                targetUserId:
                  type: string
                  format: uuid
                humanMeshId:
                  type: string
                  format: uuid
                modelFile:
                  type: string
                  format: binary
                purpose:
                  type: string
                  enum: [replace_failed, external_tool, test_data, sample, quality_replacement]
                reason:
                  type: string
                  maxLength: 1000
      responses:
        "200":
          description: 업로드 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      humanMeshId:
                        type: [string, "null"]
                        format: uuid
                      modelSource:
                        type: string
                        const: admin_uploaded
                      modelObjectPath:
                        type: string
                      adminUploadId:
                        type: string
                        format: uuid
                      action:
                        type: string
                        enum: [replace, sample_create]
        "403":
          description: 관리자 권한 필요
        "413":
          description: 모델 파일 크기 초과
        "415":
          description: 지원하지 않는 모델 파일
  /admin/metrics:
    get:
      summary: 관리자 지표 조회
      responses:
        "200":
          description: 지표 조회 성공
